name: 10xTeam AI Router
version: 1.0.0
schema: v1

models:
  - name: GPT-5.5 (Default)
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    model: openai/gpt-5
    roles:
      - chat
      - edit
      - apply
      - summarize
    defaultCompletionOptions:
      temperature: 0.2
      maxTokens: 4000

  - name: GPT-5
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    model: openai/gpt-5
    roles:
      - chat
      - edit
      - apply

  - name: Claude Opus
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    model: anthropic/claude-opus-4.1
    roles:
      - chat
      - edit
      - apply

  - name: Claude Sonnet
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    model: anthropic/claude-sonnet-4
    roles:
      - chat
      - edit
      - apply

  - name: Gemini Pro
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    model: google/gemini-2.5-pro
    roles:
      - chat
      - edit
      - apply

  # Gemini Flash es excelente y muy económico para autocompletar si quieres alternar
  - name: Gemini Flash
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    model: google/gemini-2.5-flash
    roles:
      - chat
      - edit
      - apply
      - autocomplete

  # --- CONFIGURACIÓN DE QWEN OPTIMIZADA PARA AUTOCOMPLETAR ---
  - name: Qwen
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    model: qwen/qwen3-coder
    roles:
      - chat
      - edit
      - apply
      - autocomplete

  - name: DeepSeek
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    model: deepseek/deepseek-chat-v3.1
    roles:
      - chat
      - edit
      - apply

  - name: Kimi
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
    model: moonshotai/kimi-k2
    roles:
      - chat
      - edit
      - apply

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal

rules:
  - Usar el modelo correcto para cada tarea, no un solo modelo para todo.
  - Seguir el mapeo operativo de docs/team/AI_Model_Architecture_Master.md para elegir modelo.
  - Si una tarea mezcla estrategia y ejecucion, empezar con modelo estrategico y luego pasar a builder.
  - Cuando presentes un plan, siempre sugiere que modelo usar para cada fase del trabajo.
